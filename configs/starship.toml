# Starship prompt configuration
# Minimal developer-focused prompt

# Timeout for commands (ms)
command_timeout = 500

# Format for the prompt
format = """
[](#9A348E)\
$username\
[](bg:#DA627D fg:#9A348E)\
$directory\
[](fg:#DA627D bg:#FCA17D)\
$git_branch\
$git_status\
[](fg:#FCA17D bg:#86BBD8)\
$python\
$golang\
$nodejs\
[](fg:#86BBD8 bg:#06969A)\
$kubernetes\
$docker_context\
[](fg:#06969A)\
$line_break\
$character"""

# Disable the blank line at the start of the prompt
add_newline = true

[username]
show_always = true
style_user = "bg:#9A348E"
style_root = "bg:#9A348E"
format = '[$user ]($style)'

[directory]
style = "bg:#DA627D"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = ""
style = "bg:#FCA17D"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#FCA17D"
format = '[$all_status$ahead_behind ]($style)'

[python]
symbol = ""
style = "bg:#86BBD8"
format = '[ $symbol $version ]($style)'
detect_extensions = ["py"]
pyenv_version_name = true

[golang]
symbol = ""
style = "bg:#86BBD8"
format = '[ $symbol $version ]($style)'

[nodejs]
symbol = ""
style = "bg:#86BBD8"
format = '[ $symbol $version ]($style)'

[kubernetes]
symbol = "☸"
style = "bg:#06969A"
format = '[ $symbol $context ]($style)'
disabled = false

[kubernetes.context_aliases]
"dev" = "dev"
"staging" = "stg"
"production" = "prod"

[docker_context]
symbol = ""
style = "bg:#06969A"
format = '[ $symbol $context ]($style)'

[character]
success_symbol = '[➜](bold green)'
error_symbol = '[➜](bold red)'
